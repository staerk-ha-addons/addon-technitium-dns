---
name: Technitium DNS Server
version: dev
slug: technitium-dns
description: Self-hosted DNS server with Home Assistant add-on integration.
url: https://github.com/staerk-ha-addons/addon-technitium-dns
ingress: true
# Host-network add-ons must use a dynamic ingress port (0). An nginx
# proxy (see rootfs) listens on the assigned port and forwards to
# Technitium on 127.0.0.1:5380.
ingress_port: 0
panel_icon: mdi:dns
startup: services
init: false
arch:
  - amd64
  - aarch64
map:
  - type: ssl
  - type: addon_config
    read_only: false
host_network: true
ports:
  53/tcp: null
  53/udp: 53
  443/tcp: null
  443/udp: null
  853/tcp: null
  853/udp: null
  5380/tcp: null
  53443/tcp: null
