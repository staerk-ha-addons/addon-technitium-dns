worker_processes 1;
pid /var/run/nginx.pid;
error_log /proc/1/fd/1 warn;

events {
    worker_connections 1024;
}

http {
    access_log off;

    # Support WebSocket upgrades for the Technitium web console.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # The ingress server block is rendered at runtime by the `ingress`
    # service with the Supervisor-assigned port.
    include /etc/nginx/servers/*.conf;
}
